name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run Java build (mvn -q -DskipTests)
        run: |
          if [ -f pom.xml ]; then mvn -q -DskipTests package || true; fi
      - name: Run Python tests
        run: |
          if [ -f services/notification-service/pyproject.toml ]; then cd services/notification-service && pytest -q || true; fi
      - name: Lint portals (placeholder)
        run: echo "Run portal linting in real pipeline"
      - name: Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1

      - name: Java SCA (OWASP dependency-check)
        run: |
          if [ -f pom.xml ]; then mvn org.owasp:dependency-check-maven:check || true; fi

      - name: Python SCA (pip-audit)
        run: |
          if [ -d services/notification-service ]; then python -m pip install --upgrade pip && python -m pip install pip-audit && (cd services/notification-service && pip-audit) || true; fi

      - name: Gitleaks (secret scanning)
        uses: zricethezav/gitleaks-action@v2
        with:
          args: --redact
