name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run Java build (mvn -q -DskipTests)
        run: |
          if [ -f pom.xml ]; then mvn -q -DskipTests package || true; fi
      - name: Run Python tests
        run: |
          if [ -f services/notification-service/pyproject.toml ]; then cd services/notification-service && pytest -q || true; fi
      - name: Lint portals (placeholder)
        run: echo "Run portal linting in real pipeline"
      - name: Security scans (placeholder)
        run: echo "Run Trivy/Gitleaks/Semgrep here"
